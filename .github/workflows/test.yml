name: Test

on:
  push:
    branches: # on all branches except `typos`
      - "**"
      - "!typos"
    paths-ignore:
      - "docs/**"
      - "examples/**"
      - "data/**"
      - ".git*"
      - "README.md"
  pull_request:
    branches:
      - "**"
  schedule: # Every Monday at 04:00 UTC
    - cron: "0 4 * * 1"

jobs:
  caching:
    strategy:
      matrix:
        python-version: ["3.12"]
        os: [ubuntu-latest]
      fail-fast: false
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    defaults:
      run:
        shell: bash -elo pipefail {0}

    name: Cache for ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Get week number
        run: echo "WEEK=$(date +'%V')" >> $GITHUB_ENV

      - name: Set up Python ${{ matrix.python-version }}
        uses: mamba-org/setup-micromamba@v2
        with:
          create-args: python=${{ matrix.python-version }}
          environment-file: environment-dev.yml
          cache-environment: true
          cache-environment-key: W${{ env.WEEK }}

  run-tests:
    needs: caching
    strategy:
      matrix:
        python-version: ["3.12"]
        os: [ubuntu-latest]
        submodule:
          - { name: "Functions", pytest_args: "tests/test_functions.py" }
          - { name: "Main", pytest_args: "tests/test_main.py" }
      fail-fast: false

    name: ${{ matrix.submodule.name }} (${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    defaults:
      run:
        shell: bash -el {0}

    steps:
      - uses: actions/checkout@v6

      - name: Get week number
        run: echo "WEEK=$(date +'%V')" >> $GITHUB_ENV

      - name: Set up Python ${{ matrix.python-version }}
        uses: mamba-org/setup-micromamba@v2
        with:
          create-args: python=${{ matrix.python-version }}
          environment-file: environment-dev.yml
          cache-environment: true
          cache-environment-key: W${{ env.WEEK }}

      - name: Install growbikenet
        run: pip install --no-build-isolation --no-deps -e .

      - name: "Run tests ${{ matrix.submodule.name }}"
        run: |
          coverage run --data-file tests/.coverage -m pytest ${{ matrix.submodule.pytest_args }}
          coverage json --data-file tests/.coverage -o tests/coverage.json
          coverage report --data-file tests/.coverage

      - name: "Combine" # https://nedbatchelder.com/blog/202209/making_a_coverage_badge
        run: |
          export TOTAL=$(python -c "import json;print(json.load(open('tests/coverage.json'))['totals']['percent_covered_display'])")
          echo "total=$TOTAL" >> $GITHUB_ENV
          echo "### Total coverage: ${TOTAL}%" >> $GITHUB_STEP_SUMMARY

      - name: "Make badge" # https://nedbatchelder.com/blog/202209/making_a_coverage_badge
        uses: schneegans/dynamic-badges-action@v1.8.0
        with:
          # GIST_TOKEN is a GitHub personal access token with scope "gist".
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: fa90e1bc9a90719944b41f6af03ced49    # replace with your real Gist id.
          filename: covbadge.json
          label: Coverage
          message: ${{ env.total }}%
          minColorRange: 50
          maxColorRange: 90
          valColorRange: ${{ env.total }}