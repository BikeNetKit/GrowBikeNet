name: gbnenv
channels:
  - conda-forge
dependencies:
  - python=3.12
  - geopandas>=0.14
  - jupyter
  - jupyterlab
  - ipywidgets
  - ipykernel
  - matplotlib
  - osmnx>=1.9.4
  - tqdm
  - geojson
  - pip
  - momepy
  - pytest
  - pip:
      # not available via conda-forge:
      - opencv-python
      - pre-commit
      - python-slugify
